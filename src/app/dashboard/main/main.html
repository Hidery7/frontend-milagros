<div class="container-fluid mt-4">

  <!-- HEADER con usuario logueado -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold">
        <i class="bi bi-grid me-2 text-primary"></i>
        Sistema de Inventario
      </h4>
      <small class="text-muted">
        Bienvenido, <strong>{{ currentUser?.usuario }}</strong>
        <span class="badge ms-2" [ngClass]="authService.isAdmin() ? 'bg-danger' : 'bg-primary'">
          {{ authService.getRol() }}
        </span>
      </small>
    </div>
    <button class="btn btn-outline-danger" (click)="logout()">
      <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
    </button>
  </div>

  <!-- MENÚ DE MÓDULOS -->
  <div *ngIf="!activeSection" class="row">

    <div class="col-12 mb-4">
      <h5 class="text-muted">Seleccione un módulo para comenzar</h5>
    </div>

    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let module of modulesVisibles">
      <div class="card h-100 shadow-sm border-0 module-card"
           (click)="selectModule(module.id)">
        <div class="card-body text-center py-4">
          <div class="mb-3" [ngClass]="'text-' + module.color">
            <i [class]="'bi ' + module.icon" style="font-size: 2.5rem;"></i>
          </div>
          <h5 class="card-title fw-bold">{{ module.name }}</h5>
          <p class="card-text text-muted small">{{ module.description }}</p>
          <button class="btn btn-sm mt-2" [ngClass]="'btn-' + module.color">
            Acceder <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- SECCIÓN ACTIVA -->
  <div *ngIf="activeSection">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="mb-0 fw-bold">
        <i [class]="'bi ' + activeModule?.icon + ' me-2'"></i>
        {{ activeModule?.name }}
      </h5>
      <button class="btn btn-secondary" (click)="backToMenu()">
        <i class="bi bi-arrow-left me-2"></i>Volver al Menú
      </button>
    </div>

    <app-proveedores  *ngIf="activeSection === 'proveedores'"></app-proveedores>
    <app-productos    *ngIf="activeSection === 'productos'"></app-productos>
    <app-inventariado *ngIf="activeSection === 'inventariado'"></app-inventariado>
    <app-personal     *ngIf="activeSection === 'personal'"></app-personal>
    <app-categoria    *ngIf="activeSection === 'categoria'"></app-categoria>
    <app-usuarios     *ngIf="activeSection === 'usuarios'"></app-usuarios>

  </div>

</div>
