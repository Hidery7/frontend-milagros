<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Gestión de Categorías</h5>
    <button class="btn btn-primary" (click)="showCreateForm()" *ngIf="!showForm">
      <i class="bi bi-plus-circle me-2"></i>Nueva Categoría
    </button>
  </div>

  <div class="card-body">
    <!-- Formulario de Crear / Editar Categoría -->
    <div *ngIf="showForm" class="mb-4">
      <h6>{{ isEditing ? 'Editar' : 'Crear' }} Categoría</h6>
      <form (ngSubmit)="saveCategoria()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre *</label>
            <input type="text" class="form-control" [(ngModel)]="currentCategoria.nombre" name="nombre" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Estado</label>
            <div class="form-check form-switch">
              <!-- ✅ Cambiado de 'activo' a 'estado' -->
              <input 
                class="form-check-input" 
                type="checkbox" 
                [(ngModel)]="currentCategoria.estado" 
                name="estado"
                id="estadoSwitch">
              <label class="form-check-label" for="estadoSwitch">
                {{ currentCategoria.estado ? 'Activa' : 'Inactiva' }}
              </label>
            </div>
          </div>

          <div class="col-12 mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="currentCategoria.descripcion" name="descripcion" rows="2"></textarea>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-2"></i>Guardar
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancelForm()">
            <i class="bi bi-x-circle me-2"></i>Cancelar
          </button>
        </div>
      </form>
      <hr class="my-4">
    </div>

    <!-- Búsqueda -->
    <div class="mb-3">
      <input type="text" class="form-control w-25" placeholder="Buscar categorías..." [(ngModel)]="searchTerm">
    </div>

    <!-- Tabla de Categorías -->
    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let categoria of categoriafiltrada">
            <td>{{ categoria.id_categoria }}</td>
            <td>{{ categoria.nombre }}</td>
            <td>{{ categoria.descripcion }}</td>
            <td>
              <!-- ✅ Cambiado de 'activo' a 'estado' -->
              <span class="badge" [ngClass]="categoria.estado ? 'bg-success' : 'bg-secondary'">
                {{ categoria.estado ? 'Activa' : 'Inactiva' }}
              </span>
            </td>
            <td>
              <div class="d-flex gap-1 justify-content-center">
                <button class="btn btn-sm btn-warning me-1" (click)="showEditForm(categoria)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" (click)="deleteCategoria(categoria.id_categoria)">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="categoriafiltrada.length === 0">
            <td colspan="5" class="text-center text-muted">No hay categorías registradas</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
