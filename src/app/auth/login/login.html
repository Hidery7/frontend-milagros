<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">

  <div class="card shadow-lg border-0" style="width: 100%; max-width: 420px;">

    <!-- HEADER -->
    <div class="card-header bg-primary text-white text-center py-4 border-0">
      <i class="bi bi-box-seam fs-1"></i>
      <h4 class="mt-2 mb-0 fw-bold">Sistema de Inventario</h4>
      <small class="opacity-75">Ingresa tus credenciales</small>
    </div>

    <div class="card-body p-4">

      <!-- ALERTA DE ERROR -->
      <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ errorMsg }}</span>
      </div>

      <form (ngSubmit)="login()">

        <!-- USUARIO -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-person me-1"></i>Usuario
          </label>
          <input
            type="text"
            class="form-control form-control-lg"
            placeholder="Ingresa tu usuario"
            [(ngModel)]="usuario"
            name="usuario"
            autocomplete="username"
            [disabled]="loading">
        </div>

        <!-- CONTRASEÑA -->
        <div class="mb-4">
          <label class="form-label fw-semibold">
            <i class="bi bi-lock me-1"></i>Contraseña
          </label>
          <div class="input-group">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control form-control-lg"
              placeholder="Ingresa tu contraseña"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              [disabled]="loading">
            <button
              type="button"
              class="btn btn-outline-secondary"
              (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- BOTÓN -->
        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>

    </div>

    <!-- FOOTER -->
    <div class="card-footer text-center text-muted py-3 bg-white border-0">
      <small><i class="bi bi-shield-lock me-1"></i>Acceso restringido al personal autorizado</small>
    </div>

  </div>

</div>
